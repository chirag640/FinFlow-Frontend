name: finflow
description: "FinFlow - Your All-in-One Financial Operating System"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State Management
  flutter_riverpod: ^2.5.0

  # Local Storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.0

  # UI & Design
  google_fonts: ^6.2.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  gap: ^3.0.1
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  equatable: ^2.0.5
  crypto: ^3.0.3

  # Cloud & Networking
  dio: ^5.4.0

  # Export
  csv: ^6.0.0
  share_plus: ^10.0.0
  path_provider: ^2.1.2
  pdf: ^3.10.8

  # Connectivity & Biometrics
  connectivity_plus: ^6.0.5
  local_auth: ^2.3.0
  url_launcher: ^6.3.0

  # Notifications
  flutter_local_notifications: ^18.0.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
